# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # use the pre-existing github actions to check out the code
    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # use the pre-existing github actions to set up python 3.10
      with:
        python-version: "3.10"
    - name: Install dependencies
      - name: Install dependencies
      run: |
        pip install -r requirements.txt
    - name: Run Python Script
      run: |
        python extractor.py --file document_for_parsing.pdf

    # Step 9a: Login to Docker Hub using the secrets you created
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 9b: Build the image from your Dockerfile and push it 
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/github-actions-practical:latest
    
          
  

